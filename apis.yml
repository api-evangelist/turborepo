  description: The Turborepo Remote Cache API specification defines the HTTP interface that any remote cache server must implement to be compatible with Turborepo. The remote cache stores build artifacts (outputs from tasks like build, lint, test) identified by content-addressable hashes. Endpoints cover artifact upload (PUT /artifacts/{hash}), download (GET /artifacts/{hash}), existence checks (HEAD), batch queries (POST /artifacts), status (/artifacts/status), and analytics events (POST /artifacts/events). The Vercel Remote Cache at api.vercel.com is the reference implementation; teams may self-host their own remote cache server (e.g. ducktors/ turborepo-remote-cache).
